<head>
    <link rel="stylesheet" href="../html/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap&quot; rel=" stylesheet">
</head>
<body>
    <section class="container">
        <form>
            <h1 class="title">Faça seu cadastro</h1>

            <div class="box-first">
                <label class="label-text" for="Name">Nome completo</label>
                <input class="enter-text" type="text" id="Name" placeholder="Digite seu email" />
            </div>

            <label for="date">Data de Nascimento</label>
            <input type="date" name="date" id="date">

            <label for="country">País</label>
            <select>
                <option value="brasil">Brasil</option>
                <option value="alemanha">Alemanha</option>
                <option value="china">China</option>
            </select>

            <div class="box">
                <label for="Genero">Gênero:</label>
                <input type="radio" name="radio" id="fem">
                <label for="fem">Feminino</label>

                <input type="radio" name="radio" id="mas">
                <label for="mas">Masculino</label>

                <input type="radio" name="radio" id="not">
                <label for="not">Não Declarar</label>
            </div>


        </form>
    </section>
</body>
